name: Publish Package

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Optional git ref to publish. Leave blank to use the selected branch or tag.
        required: false
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-publish
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Read package version
        id: package
        run: |
          printf 'version=%s\n' "$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Ensure release tag does not already exist
        run: |
          tag="v${{ steps.package.outputs.version }}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists"
            exit 1
          fi

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create and push release tag
        run: |
          tag="v${{ steps.package.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$tag" -m "$tag"
          git push origin "$tag"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="v${{ steps.package.outputs.version }}"
          gh release create "$tag" --generate-notes --verify-tag

      - name: Update marketplace entry
        env:
          GH_TOKEN: ${{ secrets.MARKETPLACE_TOKEN }}
        run: |
          version="${{ steps.package.outputs.version }}"
          description="$(node -p "require('./package.json').description")"

          # Fetch current file + SHA
          response=$(gh api repos/ipedro/xgh-marketplace/contents/.claude-plugin/marketplace.json)
          sha=$(echo "$response" | node -e "process.stdout.write(JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).sha)")
          current=$(echo "$response" | node -e "process.stdout.write(Buffer.from(JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).content,'base64').toString())")

          # Patch version + description for lossless-claude entry
          updated=$(echo "$current" | node -e "
            const chunks=[]; process.stdin.on('data',c=>chunks.push(c)); process.stdin.on('end',()=>{
              const m=JSON.parse(chunks.join(''));
              const p=m.plugins.find(p=>p.name==='lossless-claude');
              if(p){ p.version=process.env.VERSION; p.description=process.env.DESCRIPTION; }
              process.stdout.write(JSON.stringify(m,null,2)+'\n');
            });
          " VERSION="$version" DESCRIPTION="$description")

          encoded=$(echo "$updated" | base64 -w 0)
          gh api repos/ipedro/xgh-marketplace/contents/.claude-plugin/marketplace.json \
            --method PUT \
            --field message="chore: bump lossless-claude to $version" \
            --field content="$encoded" \
            --field sha="$sha"
