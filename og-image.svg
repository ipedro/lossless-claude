<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="120" y1="72" x2="1080" y2="558" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0E101B"/>
      <stop offset="1" stop-color="#07080F"/>
    </linearGradient>
    <linearGradient id="panel" x1="96" y1="72" x2="1096" y2="558" gradientUnits="userSpaceOnUse">
      <stop stop-color="#171925" stop-opacity="0.98"/>
      <stop offset="1" stop-color="#0E1018" stop-opacity="0.98"/>
    </linearGradient>
    <linearGradient id="accent" x1="168" y1="132" x2="520" y2="380" gradientUnits="userSpaceOnUse">
      <stop stop-color="#C5B7FF"/>
      <stop offset="0.45" stop-color="#8D7DFF"/>
      <stop offset="1" stop-color="#77C5FF"/>
    </linearGradient>
    <filter id="blur" x="0" y="0" width="1200" height="630" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="48"/>
    </filter>
    <filter id="shadow" x="0" y="0" width="1200" height="630" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="28" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <g filter="url(#blur)" opacity="0.8">
    <circle cx="314" cy="126" r="154" fill="#8D7DFF" fill-opacity="0.18"/>
    <circle cx="1018" cy="172" r="126" fill="#77C5FF" fill-opacity="0.14"/>
    <circle cx="876" cy="554" r="142" fill="#8D7DFF" fill-opacity="0.1"/>
  </g>

  <g opacity="0.08" stroke="#FFFFFF">
    <path d="M0 126H1200"/>
    <path d="M0 252H1200"/>
    <path d="M0 378H1200"/>
    <path d="M0 504H1200"/>
    <path d="M188 0V630"/>
    <path d="M376 0V630"/>
    <path d="M564 0V630"/>
    <path d="M752 0V630"/>
    <path d="M940 0V630"/>
  </g>

  <rect x="64" y="64" width="1072" height="502" rx="34" fill="url(#panel)" stroke="#2C2F44" filter="url(#shadow)"/>

  <rect x="96" y="96" width="262" height="34" rx="17" fill="#131524" stroke="#3A3F5C"/>
  <text x="116" y="118" fill="#C5B7FF" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="1.8">CLAUDE-FIRST INTEGRATION</text>

  <text x="96" y="212" fill="#F4F5FB" font-family="Inter, Arial, sans-serif" font-size="66" font-weight="800" letter-spacing="-2.8">shared memory for</text>
  <text x="96" y="286" fill="url(#accent)" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="800" letter-spacing="-3.2">agent workflows</text>

  <text x="96" y="348" fill="#AEB2CA" font-family="Inter, Arial, sans-serif" font-size="26">
    <tspan x="96" dy="0">Claude Code stays prominent. Codex support shares the same</tspan>
    <tspan x="96" dy="36">SQLite DAG runtime for agent handoffs, cross-session recall,</tspan>
    <tspan x="96" dy="36">and persistent project memory.</tspan>
  </text>

  <rect x="96" y="456" width="210" height="74" rx="18" fill="#141724" stroke="#3A4060"/>
  <text x="118" y="486" fill="#C5B7FF" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="1.2">CLAUDE CODE</text>
  <text x="118" y="515" fill="#F4F5FB" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700">hooks + MCP</text>

  <rect x="326" y="456" width="232" height="74" rx="18" fill="#141724" stroke="#3A4060"/>
  <text x="348" y="486" fill="#C5B7FF" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="1.2">LOSSLESS-CODEX</text>
  <text x="348" y="515" fill="#F4F5FB" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700">wrapper + writeback</text>

  <rect x="720" y="124" width="320" height="84" rx="22" fill="#141724" stroke="#3A4060"/>
  <text x="746" y="156" fill="#C5B7FF" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="1.2">CLIENT PATHS</text>
  <text x="746" y="188" fill="#F4F5FB" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">Claude + Codex</text>

  <path d="M880 220V246" stroke="#8D7DFF" stroke-width="2.5" stroke-linecap="round"/>

  <rect x="682" y="252" width="396" height="104" rx="24" fill="#191C2B" stroke="#4A4E70"/>
  <text x="708" y="292" fill="#C5B7FF" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="1.2">RUNTIME CORE</text>
  <text x="708" y="328" fill="#F4F5FB" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800">lossless-claude daemon</text>

  <path d="M880 366V392" stroke="#8D7DFF" stroke-width="2.5" stroke-linecap="round"/>

  <rect x="682" y="398" width="186" height="104" rx="22" fill="#131722" stroke="#3A4060"/>
  <text x="706" y="436" fill="#C5B7FF" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="1.2">PROJECT MEMORY</text>
  <text x="706" y="472" fill="#F4F5FB" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">SQLite DAG</text>

  <rect x="892" y="398" width="186" height="104" rx="22" fill="#131722" stroke="#3A4060"/>
  <text x="916" y="436" fill="#C5B7FF" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="1.2">SHARED RECALL</text>
  <text x="916" y="472" fill="#F4F5FB" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">FTS5 memory</text>
</svg>
